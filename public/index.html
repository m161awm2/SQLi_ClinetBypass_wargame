<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQLi + Client Side Bypass CTF</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1 class="rainbow_text">Super Mega Ultra Hardest CTF Challenge</h1>
      <a href="https://github.com/m161awm2/SQLi_ClinetBypass_wargame" target="_blank" rel="noopener noreferrer">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub" width="32" height="32">
      </a>
    </header>
    <main>
      
      <section id="login-section">
        <h1 class="text-box2">로그인을 하세요!</h1>
        <form id="login-form" autocomplete="off" class="login-box">
          <div> 
            <label for="username">Username</label>
            <input id="username" name="username" type="text" value="guest" />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" value="guest" />
          </div>
          <button type="submit">로그인</button>
        </form>
        <p id="login-message" aria-live="polite" class="text-box">Login to get flag</p>
      </section>
      <section id="attack-section" hidden class="fight">
        <h2>Attack Phase</h2>
        <p>Role: <strong id="role-output">guest</strong></p>
        <p>HP Count: <strong id="hp-count-output">99999</strong></p>
        <button id="attack-button" type="button">⚔️공격하기⚔️</button>
        <p id="flag-output" aria-live="polite"></p>
      </section>
  
    </main>

    <script src="./main.js"></script>
  </body>
</html>
